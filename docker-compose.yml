# Local development compose — spins up Postgres only.
# The Next.js app runs via `npm run dev` (or `bun run dev`) on the host.
# In production on Unraid, the web container is run separately and points at
# Postgres via DATABASE_URL.

services:
  postgres:
    image: postgres:16-alpine
    container_name: foundry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: foundry
      POSTGRES_DB: foundry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry -d foundry"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
